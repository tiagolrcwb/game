<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 12%, rgba(185, 139, 87, 0.2), transparent 28%),
          linear-gradient(135deg, #08090d 0%, #12141c 58%, #050608 100%);
        color: #e3dac8;
        font-family: Arial, Helvetica, sans-serif;
      }

      .auth-shell {
        width: min(920px, 100%);
        display: grid;
        grid-template-columns: 1fr 380px;
        border: 1px solid #312a24;
        background: rgba(9, 10, 14, 0.9);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      }

      .lore-panel {
        padding: 42px;
        border-right: 1px solid #312a24;
        background:
          linear-gradient(rgba(8, 9, 13, 0.72), rgba(8, 9, 13, 0.94)),
          repeating-linear-gradient(90deg, transparent 0 22px, rgba(185, 139, 87, 0.05) 22px 23px);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: #b98b57;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(34px, 5vw, 58px);
        line-height: 0.94;
      }

      .lore-panel p {
        max-width: 460px;
        margin: 0;
        color: #b9ad9a;
        line-height: 1.7;
      }

      .auth-panel {
        padding: 32px;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 22px;
      }

      .tab-button,
      button {
        border: 1px solid #3b332b;
        background: #171820;
        color: #e3dac8;
        cursor: pointer;
      }

      .tab-button {
        padding: 12px;
      }

      .tab-button.active,
      button[type='submit'] {
        border-color: #b98b57;
        background: #b98b57;
        color: #120e0a;
        font-weight: 700;
      }

      form {
        display: none;
      }

      form.active {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #c8baa5;
        font-size: 14px;
      }

      input {
        width: 100%;
        border: 1px solid #3b332b;
        background: #0f1016;
        color: #f0e6d4;
        padding: 13px 14px;
        outline: none;
      }

      input:focus {
        border-color: #b98b57;
        box-shadow: 0 0 0 3px rgba(185, 139, 87, 0.16);
      }

      button[type='submit'] {
        padding: 13px 14px;
      }

      .message {
        min-height: 22px;
        margin: 18px 0 0;
        color: #d77272;
        font-size: 14px;
      }

      @media (max-width: 760px) {
        .auth-shell {
          grid-template-columns: 1fr;
        }

        .lore-panel {
          border-right: 0;
          border-bottom: 1px solid #312a24;
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main class="auth-shell">
      <section class="lore-panel" aria-labelledby="game-title">
        <p class="eyebrow">Fantasia medieval sombria</p>
        <h1 id="game-title" data-game-title>Carregando jogo</h1>
        <p>
          Entre em uma cidade murada onde tavernas, guildas e velhas estradas
          sustentam a falsa seguran&ccedil;a antes que a noite reclame o mundo al&eacute;m dos port&otilde;es.
        </p>
      </section>

      <section class="auth-panel" aria-label="Acesso ao jogo">
        <div class="tabs">
          <button class="tab-button active" type="button" data-tab="login">Entrar</button>
          <button class="tab-button" type="button" data-tab="register">Cadastrar</button>
        </div>

        <form class="active" data-form="login" method="post" action="/api/login">
          <label>
            Usu&aacute;rio
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            Senha
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Entrar no jogo</button>
        </form>

        <form data-form="register" method="post" action="/api/register">
          <label>
            Usu&aacute;rio
            <input name="username" autocomplete="username" minlength="3" maxlength="20" required />
          </label>
          <label>
            Senha
            <input name="password" type="password" autocomplete="new-password" minlength="6" required />
          </label>
          <button type="submit">Criar conta</button>
        </form>

        <p class="message" data-message></p>
      </section>
    </main>

    <script src="auth.js?v=2026-06-03-point-click-1"></script>
  </body>
</html>
