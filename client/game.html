<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Jogo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050608;
        color: #d8d0bd;
        font-family: Arial, Helvetica, sans-serif;
        overscroll-behavior: none;
      }

      .game-shell {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        background: #050608;
      }

      .game-header {
        position: absolute;
        top: calc(env(safe-area-inset-top) + 12px);
        left: calc(env(safe-area-inset-left) + 12px);
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 10px;
        max-width: calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 24px);
        min-height: 42px;
        padding: 8px 10px;
        border: 1px solid rgba(185, 139, 87, 0.34);
        border-radius: 6px;
        background: rgba(8, 9, 13, 0.76);
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.34);
        pointer-events: none;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
        text-transform: uppercase;
        color: #b98b57;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .user-area {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #b9ad9a;
        font-size: 14px;
        min-width: 0;
        pointer-events: auto;
      }

      .connection-status {
        color: #8fbf91;
        font-size: 12px;
      }

      .connection-status.offline {
        color: #d77272;
      }

      button {
        border: 1px solid #3b332b;
        background: #171820;
        color: #e3dac8;
        padding: 8px 10px;
        cursor: pointer;
        flex: 0 0 auto;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: #111217;
        image-rendering: pixelated;
        touch-action: none;
        user-select: none;
      }

      @media (max-width: 720px) {
        .game-header {
          top: calc(env(safe-area-inset-top) + 6px);
          left: calc(env(safe-area-inset-left) + 6px);
          gap: 6px;
          max-width: calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 12px);
          min-height: 0;
          padding: 4px 5px;
          border-radius: 4px;
          background: rgba(8, 9, 13, 0.58);
          box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
        }

        h1 {
          max-width: 34vw;
          font-size: 10px;
        }

        .user-area {
          gap: 5px;
          font-size: 10px;
        }

        [data-username] {
          display: none;
        }

        .connection-status {
          width: 7px;
          height: 7px;
          overflow: hidden;
          border-radius: 999px;
          background: #8fbf91;
          color: transparent;
        }

        .connection-status.offline {
          background: #d77272;
          color: transparent;
        }

        button {
          min-width: 28px;
          min-height: 24px;
          padding: 3px 6px;
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <h1 data-game-title>Carregando jogo</h1>
        <div class="user-area">
          <span class="connection-status" data-connection-status>Conectando</span>
          <span data-username></span>
          <button type="button" data-logout>Sair</button>
        </div>
      </header>

      <canvas id="gameCanvas" width="1140" height="600"></canvas>
    </main>

    <script src="game.js?v=2026-06-04-point-click-speed-1"></script>
  </body>
</html>
